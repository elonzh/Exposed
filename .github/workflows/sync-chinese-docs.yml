name: Sync Chinese Documentation

on:
  # Weekly on Sunday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 0'

  # Manual trigger
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force re-translate all files'
        type: boolean
        default: false

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
        with:
          model: xiaomi-token-plan-cn/mimo-v2.5-pro
          prompt: |
            同步并翻译 Exposed ORM 文档

  build-image:
    needs: sync-docs
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/exposed-docs-zh
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: documentation-website-zh
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
