name: Sync Chinese Documentation

on:
  # Weekly on Sunday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 0'

  # Manual trigger
  workflow_dispatch:
    inputs:
      force_translate:
        description: 'Force re-translate all files'
        type: boolean
        default: false

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      packages: write

    steps:
      # Pin to v4: https://github.com/actions/checkout/issues/2299
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: xiaomi-token-plan-cn/mimo-v2.5-pro
          prompt: "/exposed-docs-sync  同步并翻译 Exposed ORM 文档"

  build-image:
    needs: sync-docs
    uses: ./.github/workflows/build-docs-zh-image.yml
    secrets: inherit

  notify:
    runs-on: ubuntu-latest
    needs: [sync-docs, build-image]
    if: always()
    steps:
      # Pin to v4: https://github.com/actions/checkout/issues/2299
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          chmod +x documentation-website-zh/scripts/notify-feishu.sh
          ./documentation-website-zh/scripts/notify-feishu.sh \
            "$FEISHU_WEBHOOK_URL" \
            "${{ github.workflow }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            "${{ github.ref_name }}" \
            "${{ needs.sync-docs.result }}" \
            "${{ needs.build-image.result }}"
