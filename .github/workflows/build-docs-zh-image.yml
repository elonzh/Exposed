name: Build Docs ZH Image

on:
  # Reusable workflow
  workflow_call:

  # After sync-docs completes
  workflow_run:
    workflows: ["Sync Chinese Documentation"]
    types: [completed]

  # Manual trigger
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' }}
    permissions:
      contents: read
      packages: write

    steps:
      # Pin to v4: https://github.com/actions/checkout/issues/2299
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Writerside documentation
        run: bash documentation-website-zh/scripts/build.sh

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/exposed-docs-zh
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: documentation-website-zh/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
