name: Build Docs ZH Image

on:
  # Reusable workflow
  workflow_call:
    secrets:
      ALGOLIA_KEY:
        required: false

  # Triggered by docs-zh-sync tag push
  push:
    tags:
      - 'docs-zh-sync-*'

  # Manual trigger
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Pin to v4: https://github.com/actions/checkout/issues/2299
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/exposed-docs-zh
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: documentation-website-zh/Dockerfile
          build-args: |
            ALGOLIA_UPLOAD_NONCE=${{ github.run_id }}
          secrets: |
            "ALGOLIA_KEY=${{ secrets.ALGOLIA_KEY }}"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
